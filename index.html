<!DOCTYPE html>
<html>
<head>
    <title>Good An Spesho Hawai'i Pidgin Bible</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, Arial;
            background: #0f172a;
            color: #e2e8f0;
        }

        .app {
            max-width: 420px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        input {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            border-radius: 12px;
            border: none;
            outline: none;
        }

        button {
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #22c55e;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        #result {
            margin-top: 10px;
        }

        .header {
            text-align: center;
            font-size: 18px;
            margin-bottom: 10px;
            color: #94a3b8;
        }

        .verse-card {
            background: #1e293b;
            padding: 16px;
            margin-top: 12px;
            border-radius: 14px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .verse-number {
            color: #22c55e;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .verse-text {
            line-height: 1.6;
        }

        .loading {
            text-align: center;
            margin-top: 20px;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<div class="app">

    <h1>📖 Good An Spesho Hawai'i Pidgin Bible</h1>
    <div class="header">Search any verse</div>

    <div class="search-box">
        <input id="input" placeholder="Jn 3:16 or Ps 23:1-3">
        <button onclick="getVerse()">Go</button>
    </div>

    <div id="result"></div>

</div>

<script>
async function getVerse() {
    const ref = document.getElementById("input").value;
    const resultDiv = document.getElementById("result");

    if (!ref) return;

    resultDiv.innerHTML = "<div class='loading'>Loading...</div>";

    try {
        const res = await fetch("http://127.0.0.1:8000/verse?reference=" + encodeURIComponent(ref));
        const data = await res.json();

        let html = `<div class="header">${data.reference}</div>`;

        data.verses.forEach(v => {
            html += `
                <div class="verse-card">
                    <div class="verse-number">Verse ${v.verse}</div>
                    <div class="verse-text">${v.text}</div>
                </div>
            `;
        });

        resultDiv.innerHTML = html;

    } catch (err) {
        resultDiv.innerHTML = "<div class='loading'>Error loading verse</div>";
    }
}
</script>

</body>
</html>
