<!DOCTYPE html>
<html>
<head>
    <title>Pidgin Bible</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
        }

        .app {
            max-width: 420px;
            margin: auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border-radius: 10px;
            border: none;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-verse {
            background: #22c55e;
        }

        .btn-search {
            background: #3b82f6;
        }

        #result {
            margin-top: 20px;
        }

        .verse-card {
            background: #1e293b;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
        }

        .highlight {
            color: #facc15;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="app">
    <h1>📖 Pidgin Bible</h1>

    <input id="input" placeholder="Jn 3:16 or 'love God'">

    <button class="btn-verse" onclick="getVerse()">Get Verse</button>
    <button class="btn-search" onclick="search()">Search Words</button>

    <div id="result"></div>
</div>

<script>

const API_URL = "https://hpb-app-production.up.railway.app/verse?reference="; // change to Railway later

// ✅ GET VERSE
async function getVerse() {
    const ref = document.getElementById("input").value;
    const resultDiv = document.getElementById("result");

    resultDiv.innerHTML = "Loading...";

    const res = await fetch(`${API_URL}/verse?reference=${encodeURIComponent(ref)}`);
    const data = await res.json();

    if (data.error) {
        resultDiv.innerHTML = data.error;
        return;
    }

    let html = `<h3>${data.reference}</h3>`;

    data.verses.forEach(v => {
        html += `<div class="verse-card">
            <b>${v.verse}</b>: ${v.text}
        </div>`;
    });

    resultDiv.innerHTML = html;
}

// ✅ SEARCH WORDS
async function search() {
    const query = document.getElementById("input").value;
    const resultDiv = document.getElementById("result");

    resultDiv.innerHTML = "Searching...";

    const res = await fetch(`${API_URL}/search?q=${encodeURIComponent(query)}`);
    const data = await res.json();

    if (data.error) {
        resultDiv.innerHTML = data.error;
        return;
    }

    let html = `<h3>Results for "${data.query}"</h3>`;

    data.results.forEach(r => {
        html += `<div class="verse-card">
            <b>${r.book} ${r.chapter}:${r.verse}</b><br>
            ${r.text}
        </div>`;
    });

    resultDiv.innerHTML = html;
}

</script>

</body>
</html>
